<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Learning Path Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🚀 Adaptive Learning Path Generator</h1>
    <p class="subtitle">Upload your resume content and job description to get a personalized learning roadmap.</p>

    <form action="/analyze" method="POST">
        <div class="input-group">
            <label for="resume">Paste Resume Text</label>
            <textarea name="resume" id="resume" rows="10" placeholder="Paste your resume content here..." required></textarea>
        </div>

        <div class="input-group">
            <label for="job">Paste Job Description</label>
            <textarea name="job" id="job" rows="10" placeholder="Paste job description here..." required></textarea>
        </div>

        <button type="submit">Analyze & Generate Roadmap</button>
    </form>
</div>

</body>
</html>
